<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ai_runtime</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/styles/github-dark.min.css"
  />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-head">
        <div class="brand">Agent Runtime<span class="dot">●</span></div>
        <button id="theme-toggle" class="theme-toggle" title="Toggle light / dark theme" aria-label="Toggle theme">🌙</button>
      </div>
      <div class="sidebar-section">
      </div>
      <nav class="sidebar-nav">
        <div class="nav-row">
          <button class="nav-btn active" data-panel="chat">Chat</button>
          <button id="new-chat-nav" class="nav-new" title="New chat" aria-label="New chat"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>
        </div>
        <button class="nav-btn" data-panel="projects">Projects</button>
        <button class="nav-btn" data-panel="tasks">Tasks</button>
        <button class="nav-btn" data-panel="perms">Permissions</button>
        <button class="nav-btn" data-panel="integrations">Integrations</button>
        <button class="nav-btn" data-panel="provider">Provider</button>
        <button class="nav-btn" data-panel="settings">Settings</button>
      </nav>
      <div class="sidebar-foot">
        <button id="btn-undo" title="Restore last checkpoint">↩ Undo</button>
      </div>
    </aside>

    <!-- Main -->
    <main id="main">
      <!-- Chat panel -->
      <section id="panel-chat" class="panel active">
        <div id="chat-area">
          <div id="messages"></div>
          <button id="scroll-bottom" class="scroll-bottom hidden" title="Scroll to bottom" aria-label="Scroll to bottom">↓</button>
          <div id="empty-state" class="empty">
            <div class="empty-logo">Agent Runtime</div>
            <p>How can I help you today?</p>
            <div class="suggestions">
              <button class="chip">Explain a codebase concept</button>
              <button class="chip">Write a unit test</button>
              <button class="chip">Refactor this function</button>
              <button class="chip">/compact the context</button>
            </div>
          </div>
          <div id="rate-limit-banner" class="rate-limit-banner hidden">
            <div class="rl-text">
              <strong>Rate limit reached</strong>
              <span id="rl-detail"></span>
            </div>
            <div class="rl-actions">
              <button id="rl-change-provider">Change provider</button>
              <button id="rl-retry">Retry</button>
            </div>
          </div>
          <div class="composer-wrap">
            <div id="attachments" class="attachments hidden"></div>
            <div class="composer">
              <button id="attach-btn" class="attach-btn" title="Attach file" aria-label="Attach file">📎</button>
              <input id="file-input" type="file" multiple class="hidden" />
              <textarea id="input" rows="1" placeholder="Message ai_runtime…  (Enter to send, Shift+Enter for newline)"></textarea>
              <button id="send" aria-label="Send">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 11l18-8-8 18-2-7-8-3z"/></svg>
              </button>
              <button id="stop" class="stop-btn hidden" aria-label="Stop" title="Stop generating">■</button>
            </div>
            <div class="composer-hint">
              <button id="mode-toggle" class="mode-toggle" data-mode="chat">Chat</button>
              <div class="settings-group" id="effort-group" role="group" aria-label="Reasoning effort">
                <span class="settings-label">Effort</span>
                <button class="effort-btn" data-effort="low">Low</button>
                <button class="effort-btn" data-effort="medium">Med</button>
                <button class="effort-btn" data-effort="high">High</button>
              </div>
              <button id="thinking-toggle" class="thinking-toggle" data-on="false" title="Enable thinking/reasoning">
                💡 Thinking
              </button>
              <span class="hint-text">Streaming · Markdown · Tools · <code>/compact</code> <code>/clear</code></span>
            </div>
          </div>
        </div>
        <!-- Artifacts / Canvas side panel -->
        <aside id="artifact-panel" class="hidden">
          <div class="artifact-head">
            <span>Artifact</span>
            <button id="artifact-close" title="Close">✕</button>
          </div>
          <div id="artifact-body" class="artifact-body"></div>
        </aside>
        <!-- Session history (right rail, shown when sessions exist) -->
        <aside id="session-rail" class="hidden">
          <div class="rail-tools">
            <input id="session-search" placeholder="Search chats…" />
            <button id="export-btn" title="Export conversation">⤓</button>
          </div>
          <ul id="session-list"></ul>
        </aside>
      </section>

      <!-- Projects panel -->
      <section id="panel-projects" class="panel">
        <div class="panel-head"><h2>Projects</h2></div>
        <form id="project-form" class="row">
          <input id="proj-root" placeholder="/path/to/project" />
          <input id="proj-name" placeholder="name (optional)" />
          <button type="submit">Create</button>
        </form>
        <ul id="project-list" class="card-list"></ul>
      </section>

      <!-- Tasks panel -->
      <section id="panel-tasks" class="panel">
        <div class="panel-head"><h2>Background Tasks</h2></div>
        <div class="row">
          <input id="task-msg" placeholder="Background task prompt" />
          <button id="submit-task">Run in background</button>
          <button id="refresh-tasks">Refresh</button>
        </div>
        <ul id="task-list" class="card-list"></ul>
      </section>

      <!-- Permissions panel -->
      <section id="panel-perms" class="panel">
        <div class="panel-head"><h2>Permission Rules</h2></div>
        <form id="perm-form" class="row">
          <input id="perm-project" placeholder="project" />
          <input id="perm-tool" placeholder="Tool (e.g. Bash)" />
          <input id="perm-params" placeholder="params glob (*)" />
          <select id="perm-decision">
            <option value="allow">allow</option>
            <option value="deny">deny</option>
            <option value="ask">ask</option>
          </select>
          <button type="submit">Add rule</button>
        </form>
        <ul id="perm-list" class="card-list"></ul>
      </section>

      <!-- Provider panel -->
      <section id="panel-provider" class="panel">
        <div class="panel-head"><h2>Provider</h2></div>
        <form id="provider-form" class="row col">
          <label class="field">
            <span>Provider</span>
            <select id="prov-provider"></select>
          </label>
          <label class="field">
            <span>Model</span>
            <input id="prov-model" placeholder="gpt-4o" />
          </label>
          <label class="field">
            <span>API key</span>
            <input id="prov-key" type="password" placeholder="optional / env" />
          </label>
          <label class="field">
            <span>Base URL</span>
            <input id="prov-base" placeholder="optional (OpenAI-compatible)" />
          </label>
          <label class="field">
            <span>Reasoning effort</span>
            <input id="prov-reasoning" placeholder="optional (low/medium/high)" />
          </label>
          <button type="submit">Switch provider</button>
        </form>
        <div id="provider-msg" class="provider-msg"></div>
      </section>

      <!-- Integrations panel (MCP / sub-agents) -->
      <section id="panel-integrations" class="panel">
        <div class="panel-head"><h2>Integrations</h2></div>
        <form id="mcp-form" class="row col">
          <label class="field"><span>MCP command</span><input id="mcp-command" placeholder="npx -y @modelcontextprotocol/server-filesystem" /></label>
          <label class="field"><span>Args (space separated)</span><input id="mcp-args" placeholder="/path/to/allow" /></label>
          <button type="submit">Connect MCP</button>
        </form>
        <div id="mcp-msg" class="provider-msg"></div>
        <div class="panel-head"><h3>Sub-agents</h3></div>
        <form id="subagent-form" class="row col">
          <label class="field"><span>Name</span><input id="sub-name" placeholder="researcher" /></label>
          <label class="field"><span>Task template</span><input id="sub-task" placeholder="{task}" /></label>
          <button type="submit">Add sub-agent</button>
        </form>
        <div id="subagent-msg" class="provider-msg"></div>
      </section>

      <!-- Settings panel -->
      <section id="panel-settings" class="panel">
        <div class="panel-head"><h2>Settings</h2></div>
        <div class="row col">
          <label class="field"><span>Theme</span>
            <select id="set-theme">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
            </select>
          </label>
          <label class="field"><span>Font size</span>
            <select id="set-font">
              <option value="14">Small</option>
              <option value="15" selected>Medium</option>
              <option value="17">Large</option>
            </select>
          </label>
          <label class="field"><span>Default mode</span>
            <select id="set-mode">
              <option value="chat">Chat</option>
              <option value="plan">Plan</option>
            </select>
          </label>
          <label class="field"><span>Default reasoning effort</span>
            <select id="set-effort">
              <option value="">None</option>
              <option value="low">Low</option>
              <option value="medium">Med</option>
              <option value="high">High</option>
            </select>
          </label>
          <label class="field checkbox"><input type="checkbox" id="set-thinking" /> Enable thinking by default</label>
        </div>
      </section>
    </main>
  </div>

  <!-- Command palette -->
  <div id="palette" class="palette hidden">
    <div class="palette-box">
      <input id="palette-input" placeholder="Type a command or search…" />
      <ul id="palette-list"></ul>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toasts" class="toasts"></div>

  <!-- Markdown + syntax highlight -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
